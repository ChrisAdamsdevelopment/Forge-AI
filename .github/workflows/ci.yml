name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pytest
      - run: pip install -r implementation/backend/requirements.txt
      - run: ruff check implementation/backend/forge/
      - run: ruff format --check implementation/backend/forge/
      - run: pytest implementation/backend/tests
