services:
  forge-api:
    build:
      context: ../implementation/backend
    container_name: forge-api
    ports:
      - "9147:9147"
    environment:
      - FORGE_DATA_DIR=/data
      - FORGE_OLLAMA_BASE_URL=http://ollama:11434
      - FORGE_VECTOR_DB=lancedb
    volumes:
      - forge-data:/data
      - ../rag/knowledge:/srv/forge/knowledge:ro
      - ../output:/srv/forge/output
      - ../modules:/srv/forge/modules:ro
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: forge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  forge-data:
  ollama-data:
