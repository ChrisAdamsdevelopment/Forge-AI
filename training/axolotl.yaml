base_model: Qwen/Qwen3.5-9B
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

load_in_4bit: true
strict: false

datasets:
  - path: training/example_data/train.jsonl
    type: chat_template

val_set_size: 0.05
output_dir: ./outputs/forge-qwen-lora

adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true

sequence_len: 8192
sample_packing: true
pad_to_sequence_len: true

micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 2
learning_rate: 0.0002

optimizer: adamw_bnb_8bit
lr_scheduler: cosine
warmup_ratio: 0.03

save_steps: 50
eval_steps: 50
logging_steps: 10
